services:
  # Database for Events Service
  db-events:
    image: postgres:15-alpine
    container_name: ticket-db-events
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - events_data:/var/lib/postgresql/data
    networks:
      - ticket-network

  # Database for Booking Service
  db-bookings:
    image: postgres:15-alpine
    container_name: ticket-db-bookings
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bookings_db
    ports:
      - "5433:5432"
    volumes:
      - bookings_data:/var/lib/postgresql/data
    networks:
      - ticket-network

  # Redis for Caching and Distributed Locks
  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticket-network

  # RabbitMQ for Event Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ticket-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ticket-network

  # Discovery Service (Eureka)
  discovery-service:
    build: ./services/discovery-service
    container_name: ticket-discovery
    ports:
      - "8761:8761"
    networks:
      - ticket-network

  # API Gateway
  gateway-service:
    build: ./services/gateway-service
    container_name: ticket-gateway
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - redis
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  events_data:
  bookings_data:
  redis_data:
  rabbitmq_data:
