services:
  # Database for Events Service
  db-events:
    image: postgres:15-alpine
    container_name: ticket-db-events
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - events_data:/var/lib/postgresql/data
    networks:
      - ticket-network

  # Database for Booking Service
  db-bookings:
    image: postgres:15-alpine
    container_name: ticket-db-bookings
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bookings_db
    ports:
      - "5433:5432"
    volumes:
      - bookings_data:/var/lib/postgresql/data
    networks:
      - ticket-network

  # Redis for Caching and Distributed Locks
  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticket-network

  # RabbitMQ for Event Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ticket-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ticket-network

  # Discovery Service (Eureka Server)
  discovery-service:
    build: 
      context: ./services/discovery-service
    container_name: ticket-discovery
    ports:
      - "8761:8761"
    networks:
      - ticket-network

  # API Gateway
  gateway-service:
    build: 
      context: ./services/gateway-service
    container_name: ticket-gateway
    environment:
      - EUREKA_HOST=discovery-service
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    networks:
      - ticket-network

  # Catalog Service
  catalog-service:
    build:
      context: ./services/catalog-service
    container_name: ticket-catalog
    environment:
      - DB_HOST=db-events
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - EUREKA_HOST=discovery-service
    ports:
      - "8081:8081"
    depends_on:
      - db-events
      - discovery-service
    networks:
      - ticket-network

  # Booking Service
  booking-service:
    build:
      context: ./services/booking-service
    container_name: ticket-booking
    environment:
      - DB_HOST=db-bookings
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBIT_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - EUREKA_HOST=discovery-service
    ports:
      - "8082:8082"
    depends_on:
      - db-bookings
      - redis
      - rabbitmq
      - discovery-service
    networks:
      - ticket-network

  # Payment Service
  payment-service:
    build:
      context: ./services/payment-service
    container_name: ticket-payment
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBIT_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - EUREKA_HOST=discovery-service
    ports:
      - "8083:8083"
    depends_on:
      - rabbitmq
      - discovery-service
    networks:
      - ticket-network

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
    container_name: ticket-notification
    environment:
      - RABBIT_HOST=rabbitmq
      - RABBIT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBIT_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - EUREKA_HOST=discovery-service
    ports:
      - "8085:8085"
    depends_on:
      - rabbitmq
      - discovery-service
    networks:
      - ticket-network

  # Database for Users Service
  db-users:
    image: postgres:15-alpine
    container_name: ticket-db-users
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users_db
    ports:
      - "5434:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    networks:
      - ticket-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
    container_name: ticket-user
    environment:
      - DB_HOST=db-users
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - EUREKA_HOST=discovery-service
      - JWT_SECRET=${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      - JWT_EXPIRATION=86400000 # 24 hours
    ports:
      - "8084:8084"
    depends_on:
      - db-users
      - discovery-service
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  events_data:
  bookings_data:
  users_data:
  redis_data:
  rabbitmq_data:
